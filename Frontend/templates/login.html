<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - YourShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="login-container">
        <div class="login-box">
            <h2>Welcome Back!</h2>
            <p>Login to continue to YourShop</p>
            <form id="loginForm" method="POST" action="{{ url_for('login') }}" novalidate>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>
                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            <div class="separator">
                <span>OR</span>
            </div>
            <div class="social-login">
                <a href="https://www.google.com" class="social-btn google">
                    <i class="fab fa-google"></i>Sign in with Google </a>
                <a href="https://www.facebook.com" class="social-btn facebook">
                    <i class="fab fa-facebook"></i>Sign in with Facebook </a>
            </div>
            <p class="signup-link">
                Don't have an account? <a href="{{ url_for('signup') }}">Signup now</a>
            </p>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            loginForm.addEventListener('submit', (event) => {
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();
                let isValid = true;

                if (email === '') {
                    alert('Please enter your email.');
                    emailInput.focus();
                    isValid = false;
                    event.preventDefault();
                    return;
                }
                if (!isValidEmail(email)) {
                    alert('Please enter a valid email address.');
                    emailInput.focus();
                    isValid = false;
                    event.preventDefault();
                    return;
                }
                if (password === '') {
                    alert('Please enter your password.');
                    passwordInput.focus();
                    isValid = false;
                    event.preventDefault();
                    return;
                }
            });

            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
        });
    </script>
</body>
</html>
